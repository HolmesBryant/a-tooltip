<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>A-Tooltip Web Component</title>
	<script type="module" src="src/a-tooltip.js"></script>
	<script type="module" src="extra/a-tabset.js"></script>
	<script type="module" src="extra/a-bind.js"></script>
	<script defer src="extra/scripts.js"></script>

	<link rel="stylesheet" href="extra/styles.css">
	<link rel="stylesheet" href="extra/a-tabset.css">
</head>
<body>
	<h1>A-Tooltip Web Component</h1>
	<p>A custom element for displaying a tooltip: <a href="https://github.com/HolmesBryant/a-tooltip">Github Repo</a></p>

	<details>
	<summary>README</summary>
		<div id="instructions"> </div>
	</details>

	<h2>Demo</h2>
	<section class="flex">
		<div class="flex">
				<a-tabset>
					<strong slot="title">Attributes</strong>
					<div slot="content">
							<div class="flex">
								<div class="flex column">
									<label for="active-attr">active</label>
									<a-bind o="a-tooltip" p="active" e="change" a="value">
										<select id="active-attr" size="2">
											<option>true</option>
											<option>false</option>
										</select>
									</a-bind>
								</div>

								<div class="flex column">
									<label for="activate-attr">activate</label>
									<a-bind o="a-tooltip" p="activate" e="change" a="value">
										<select id="activate-attr" size="2">
											<option>default</option>
											<option>click</option>
										</select>
									</a-bind>
								</div>

								<div class="flex column">
									<label for="position-attr">Position</label>
									<a-bind o="a-tooltip" p="position" e="change" a="value">
										<select id="position-attr" size="3">
											<option selected>inline</option>
											<option>center</option>
											<option>modal</option>
										</select>
									</a-bind>
								</div>
							</div>
					</div>

					<strong slot="title">
						CSS Properties
					</strong>

					<div slot="content" class="flex column start">
								<div class="flex row-reverse space-between">
									<label for="css-symbol-color">--symbol-color</label>
									<input type="color" id="css-symbol-color">
								</div>

								<div class="flex row-reverse space-between">
									<label for="css-symbol-background">--symbol-background</label>
									<input type="color" id="css-symbol-background">
								</div>

								<div class="flex row-reverse space-between">
									<label for="css-accent-color">--accent-color</label>
									<input type="color" id="css-accent-color">
								</div>

								<div class="flex row-reverse space-between">
									<label for="css-border-color">--border-color</label>
									<input type="color" id="css-border-color">
								</div>

								<div class="flex gap3">
									<div class="flex column">
										<label for="css-symbol-size">--symbol-size</label>
										<input id="css-symbol-size">
									</div>

									<div class="flex column">
										<label for="css-message-width">--message-width</label>
										<input id="css-message-width">
									</div>
								</div>
					</div>
				</a-tabset>
		</div>

		<div class="">
			<div class="">
				<label>A Label</label>

				<div class="flex">
					<input value="some value">

					<!-- <div style="height:50px; width:50px; border:1px solid orange"></div> -->

					<a-tooltip>
						<b slot="symbol">!</b>
						<h3 slot="title">Tooltip</h3>
						<div slot="message">
							foo
						</div>
					</a-tooltip>
				</div>
			</div>
		</div>
	</section>

	<section>

	</section>
</body>
</html>
