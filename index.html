<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>A-Tooltip Web Component</title>
	<script type="module" src="src/a-tooltip.js"></script>
	<script type="module" src="extra/a-tabset.js"></script>
	<script type="module" src="extra/a-bind.js"></script>
	<script type="module" src="extra/ATestRunner.js"></script>

	<script defer src="extra/a-bind-color-conversion.js"></script>
	<script defer src="extra/scripts.js"></script>

	<link rel="stylesheet" href="extra/styles.css">
	<link rel="stylesheet" href="extra/a-tabset.css">
</head>
<body>
	<h1>A-Tooltip Web Component</h1>
	<p>A custom element for displaying a tooltip: <a href="https://github.com/HolmesBryant/a-tooltip">Github Repo</a></p>

	<details>
	<summary>README</summary>
		<div id="instructions"> </div>
	</details>

	<h2>Demo</h2>
	<section class="flex space-around">

		<a-tabset active="2">
			<strong slot="title">Attributes</strong>
			<div slot="content">
				<div class="flex">
					<div class="flex column">
						<label for="active-attr">active</label>
						<a-bind o="#demo" p="active">
							<select id="active-attr" size="2">
								<option>true</option>
								<option>false</option>
							</select>
						</a-bind>
					</div>

					<div class="flex column">
						<label for="position-attr">Position</label>
						<a-bind o="#demo" p="position">
							<select id="position-attr" size="3">
								<option selected>inline</option>
								<option>center</option>
								<option>modal</option>
							</select>
						</a-bind>
					</div>
				</div>
			</div>

			<strong slot="title">
				CSS Properties
			</strong>

			<div slot="content" class="flex column start">
						<div class="flex space-between">
							<label for="css-accent-color">

							--accent-color</label>
							<a-bind
								o="a-tooltip"
								p="--accent-color"
								e="change"
								a="value">
								<input type="color" id="css-accent-color">
							</a-bind>

							<button onclick="resetInput('css-accent-color')">Reset</button>
						</div>

						<div class="flex row-reverse space-between">
							<label for="css-border-color">--border-color</label>
							<a-bind o="#demo" p="--border-color">
								<input type="color" id="css-border-color">
							</a-bind>
						</div>

						<div class="flex row-reverse space-between">
							<label for="css-symbol-color">--icon-color</label>
							<a-bind o="a-tooltip" p="--icon-color">
								<input type="color" id="css-symbol-color">
							</a-bind>
						</div>

						<div class="flex row-reverse space-between">
							<label for="css-symbol-background">--icon-background</label>
							<a-bind o="a-tooltip" p="--icon-background">
								<input type="color" id="css-symbol-background">
							</a-bind>
						</div>

						<div class="flex gap3">
							<div class="flex column">
								<label for="css-symbol-size">--icon-size</label>
								<a-bind o="#demo" p="--icon-size">
									<input id="css-symbol-size">
								</a-bind>
							</div>

							<div class="flex column">
								<label for="css-message-size">--message-size</label>
								<a-bind o="#demo" p="--message-size">
									<input id="css-message-wise">
								</a-bind>
							</div>
						</div>
			</div>
		</a-tabset>

		<div id="demo-input" class="flex">
			<div class="flex column start">
				<label>A Label</label>

				<div class="flex">
					<input value="some value">

					<a-tooltip id="demo">
						<b slot="title">Tooltip Title</b>
						This is the tooptip message.
					</a-tooltip>
				</div>
			</div>
		</div>
	</section>

	<section>
		<p>
			Position:
			<a-bind o="#demo" p="position" a="textContent">
				<span>...</span>
			</a-bind>
		</p>
	</section>

	<section>
		<test-runner all file="src/a-tooltip.js"></test-runner>
	</section>

</body>
</html>
